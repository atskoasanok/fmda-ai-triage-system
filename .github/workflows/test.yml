name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic python-dotenv openai httpx requests pytest streamlit

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Run eval suite
        env:
          USE_MOCK: "true"
        run: python -m app.evals.eval_runner
